<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="#0d190d"/>

  <!-- Soil mound -->
  <ellipse cx="64" cy="97" rx="24" ry="8" fill="#654321"/>
  <ellipse cx="64" cy="94" rx="20" ry="6" fill="#78552d"/>

  <!-- Stem -->
  <line x1="64" y1="92" x2="64" y2="52" stroke="#147837" stroke-width="6" stroke-linecap="round"/>
  <line x1="64" y1="92" x2="64" y2="52" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>

  <!-- Left leaf -->
  <ellipse cx="46" cy="68" rx="18" ry="11" fill="#22c55e"/>
  <ellipse cx="46" cy="68" rx="18" ry="11" fill="#16a34a" opacity="0.31"/>
  <line x1="64" y1="76" x2="36" y2="64" stroke="rgba(120,240,150,0.63)" stroke-width="1" stroke-linecap="round"/>

  <!-- Right leaf -->
  <ellipse cx="80" cy="56" rx="18" ry="11" fill="#22c55e"/>
  <ellipse cx="80" cy="56" rx="18" ry="11" fill="#16a34a" opacity="0.31"/>
  <line x1="64" y1="64" x2="90" y2="50" stroke="rgba(120,240,150,0.63)" stroke-width="1" stroke-linecap="round"/>

  <!-- Stem overlap on leaves -->
  <line x1="64" y1="76" x2="64" y2="52" stroke="#147837" stroke-width="3" stroke-linecap="round"/>

  <!-- Top bud -->
  <circle cx="64" cy="50" r="9" fill="#22c55e"/>
  <circle cx="64" cy="50" r="7" fill="#4ade80"/>
</svg>
